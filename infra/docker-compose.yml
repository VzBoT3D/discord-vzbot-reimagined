services:
  bot:
    image: ghcr.io/vzbot3d/vzbot-discordbot:${BACKEND_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${VZ_SERIAL_BASE_PLATE_HOST_PATH}:/data/serial-base-plates:ro
      - ${VZ_SERIAL_NUMBER_PLATES_HOST_PATH}:/data/serial-number-plates:ro
    networks:
      - app-tier
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "token: ${BACKEND_TOKEN}", "http://localhost:8080/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/vzbot3d/vzbot-nuxt:${FRONTEND_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://bot:8080}
      BACKEND_TOKEN: ${BACKEND_TOKEN}
    networks:
      - app-tier
    depends_on:
      bot:
        condition: service_healthy

  mariadb:
    image: mariadb:11.5
    restart: unless-stopped
    ports:
      - "${VZ_DB_PORT:-3306}:3306"
    networks:
      - app-tier
    environment:
      MARIADB_USER: ${VZ_DB_USER}
      MARIADB_ROOT_PASSWORD: ${VZ_DB_ROOT_PASSWORD}
      MARIADB_PASSWORD: ${VZ_DB_PASSWORD}
      MARIADB_DATABASE: ${VZ_DB_DATABASE}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15

networks:
  app-tier:

volumes:
  mariadb-data:
